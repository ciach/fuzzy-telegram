app = "arras-contract-backend"
primary_region = "mad"

[build]
  dockerfile = "backend/Dockerfile"

[deploy]
  release_command = "uv run alembic upgrade head"

[env]
  APP_ENV = "production"
  AUTO_CREATE_SCHEMA = "false"
  CORS_ORIGINS = "https://arras-contract-frontend.fly.dev"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/healthz"
