app = "arras-contract-frontend"
primary_region = "mad"

[build]
  dockerfile = "frontend/Dockerfile"

  [build.args]
    VITE_API_BASE_URL = "https://arras-contract-backend.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/healthz"
